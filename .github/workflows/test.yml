name: Test

on:
  push:
  pull_request:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-emscripten
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install emsdk 4.0.15
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$HOME/emsdk"
          "$HOME/emsdk/emsdk" install 4.0.15
          "$HOME/emsdk/emsdk" activate 4.0.15
          source "$HOME/emsdk/emsdk_env.sh"
          echo "EMSDK=$EMSDK" >> "$GITHUB_ENV"
          echo "EMSDK_NODE=$EMSDK_NODE" >> "$GITHUB_ENV"
          echo "$EMSDK" >> "$GITHUB_PATH"
          echo "$EMSDK/upstream/emscripten" >> "$GITHUB_PATH"
          emcc --version

      - name: Install tree-sitter CLI
        env:
          TREE_SITTER_VERSION: "0.26.8"
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o /tmp/tree-sitter.gz \
            "https://github.com/tree-sitter/tree-sitter/releases/download/v${TREE_SITTER_VERSION}/tree-sitter-linux-x64.gz"
          gunzip -c /tmp/tree-sitter.gz > "$HOME/.local/bin/tree-sitter"
          chmod +x "$HOME/.local/bin/tree-sitter"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/tree-sitter" --version

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Bootstrap submodule (patches + render Cargo.toml)
        run: ./scripts/arborium-rt bootstrap

      - name: Build runtime SIDE_MODULE
        run: cargo build --release

      - name: Build web-tree-sitter host (MAIN_MODULE)
        run: ./scripts/arborium-rt build-host

      # The arborium-rt package's `pretest` re-packages json + stages dist,
      # but it needs the grammar wasm *and* dist/grammars/json already present
      # (the `package` step writes src/languages.ts, which src/index.ts imports
      # — tsc fails without it). `build` = `build-grammar` + `package`.
      - name: Build + package json grammar (needed by tests)
        run: ./scripts/arborium-rt build group-acorn json

      # `stage` renders themes, copies runtime/host wasms into dist/, and
      # writes src/{themes,grammars}.ts — all needed before tsc and rsbuild can run.
      - name: Stage themes and wasms into dist/
        run: ./scripts/arborium-rt stage

      - name: Annotate wasm sizes
        run: |
          {
            echo "## Built wasm sizes"
            echo ""
            echo "| File | Size |"
            echo "|------|------|"
            find target/wasm32-unknown-emscripten/release/arborium_emscripten_runtime.wasm \
                 target/host-wasm/web-tree-sitter.wasm \
                 target/grammars -name '*.wasm' \
              | sort \
              | while read -r f; do
                  bytes=$(stat -c %s "$f")
                  human=$(numfmt --to=iec-i --suffix=B --format='%.2f' "$bytes")
                  printf '| `%s` | %s (%s bytes) |\n' "$f" "$human" "$bytes"
                done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build TypeScript packages
        run: pnpm -r build

      - name: Run tests
        run: pnpm -r test
